<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Portfolio Editor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #f8fafc;
      margin: 0;
      padding: 20px;
      color: #111827;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { color: #4338ca; margin-top: 0; }
    h2 { color: #1e293b; font-size: 1.3rem; margin-top: 2rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
    .form-group {
      margin-bottom: 1.5rem;
      display: grid;
      gap: 0.5rem;
    }
    label {
      font-weight: 600;
      color: #334155;
    }
    input, textarea {
      padding: 0.75rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      width: 100%;
    }
    textarea { resize: vertical; min-height: 80px; }
    input:focus, textarea:focus {
      outline: none;
      border-color: #4338ca;
      box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.1);
    }
    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
    }
    .btn-primary {
      background: #4338ca;
      color: white;
    }
    .btn-primary:hover { background: #3730a3; }
    .btn-secondary {
      background: #e2e8f0;
      color: #1e293b;
    }
    .btn-secondary:hover { background: #cbd5e1; }
    .item-list {
      background: white;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      min-height: 50px;
    }
    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: start;
      margin-bottom: 1rem;
      padding: 1rem;
      background: #f1f5f9;
      border-radius: 8px;
    }
    .item:last-child { margin-bottom: 0; }
    .item-content { display: grid; gap: 0.5rem; }
    .item-content h4 { margin: 0; color: #1e293b; }
    .item-content p { margin: 0; color: #64748b; }
    .item-actions { display: flex; gap: 0.5rem; }
    .status {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
    }
    .status.success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .item { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Data Scientist Portfolio Admin</h1>
    <p>Update your portfolio information and see changes reflected on your frontend.</p>
    
    <div id="status" class="status"></div>

    <h2>Basic Information</h2>
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Your name" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="role">Role / Title</label>
        <input type="text" id="role" placeholder="e.g., Data Scientist" />
      </div>
      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" placeholder="e.g., Data Science Professional" />
      </div>
    </div>
    <div class="form-group">
      <label for="about">About Me</label>
      <textarea id="about" placeholder="Write a brief description about yourself..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your.email@example.com" />
      </div>
    </div>
    <button class="btn-primary" onclick="updateBasicInfo()">Save Basic Info</button>

    <h2>Skills</h2>
    <div class="item-list" id="skills-list"></div>
    <div class="form-group">
      <label for="skill-title">Skill Title</label>
      <input type="text" id="skill-title" placeholder="e.g., Machine Learning" />
    </div>
    <div class="form-group">
      <label for="skill-desc">Skill Description</label>
      <textarea id="skill-desc" placeholder="Describe this skill..."></textarea>
    </div>
    <button class="btn-primary" onclick="addSkill()">+ Add Skill</button>

    <h2>Qualifications</h2>
    <div class="item-list" id="qualifications-list"></div>
    <div class="form-group">
      <label for="qualification">New Qualification</label>
      <textarea id="qualification" placeholder="e.g., Master's degree in Data Science"></textarea>
    </div>
    <button class="btn-primary" onclick="addQualification()">+ Add Qualification</button>

    <h2>Projects</h2>
    <div class="item-list" id="projects-list"></div>
    <div class="form-group">
      <label for="project-title">Project Title</label>
      <input type="text" id="project-title" placeholder="e.g., Customer Churn Prediction" />
    </div>
    <div class="form-group">
      <label for="project-desc">Project Description</label>
      <textarea id="project-desc" placeholder="Describe your project..."></textarea>
    </div>
    <button class="btn-primary" onclick="addProject()">+ Add Project</button>

    <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #e2e8f0;">
      <a href="/" style="color: #4338ca; text-decoration: none; font-weight: 600;">← Back to Portfolio</a>
    </div>
  </div>

  <script>
    const _origin = (window && window.location && window.location.origin && window.location.origin !== 'null') ? window.location.origin : 'http://localhost:3000';
    const apiUrl = _origin + '/api';

    async function showStatus(message, isError) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + (isError ? 'error' : 'success');
      setTimeout(() => { status.className = 'status'; }, 3000);
    }

    async function loadPortfolioData() {
      try {
        const response = await fetch(apiUrl + '/portfolio');
        const data = await response.json();
        
        document.getElementById('name').value = data.name;
        document.getElementById('role').value = data.role;
        document.getElementById('about').value = data.about;
        document.getElementById('email').value = data.contact.email;
        document.getElementById('location').value = data.contact.location;
        
        renderSkills(data.skills);
        renderQualifications(data.qualifications);
        renderProjects(data.projects);
      } catch (error) {
        showStatus('Error loading portfolio data: ' + error.message, true);
      }
    }

    async function updateBasicInfo() {
      const payload = {
        name: document.getElementById('name').value,
        role: document.getElementById('role').value,
        about: document.getElementById('about').value,
        email: document.getElementById('email').value,
        location: document.getElementById('location').value,
      };

      try {
        const response = await fetch(apiUrl + '/portfolio', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!response.ok) throw new Error('Failed to update');
        showStatus('Basic info updated successfully!', false);
      } catch (error) {
        showStatus('Error updating basic info: ' + error.message, true);
      }
    }

    async function addSkill() {
      const title = document.getElementById('skill-title').value.trim();
      const description = document.getElementById('skill-desc').value.trim();

      if (!title || !description) {
        showStatus('Please fill in all fields', true);
        return;
      }

      try {
        const response = await fetch(apiUrl + '/portfolio/skill', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description }),
        });

        if (!response.ok) throw new Error('Failed to add skill');
        showStatus('Skill added successfully!', false);
        document.getElementById('skill-title').value = '';
        document.getElementById('skill-desc').value = '';
        loadPortfolioData();
      } catch (error) {
        showStatus('Error adding skill: ' + error.message, true);
      }
    }

    async function updateSkill(index) {
      const title = prompt('Skill Title:');
      if (!title) return;
      const description = prompt('Skill Description:');
      if (!description) return;

      try {
        const response = await fetch(apiUrl + '/portfolio/skill/' + index, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description }),
        });

        if (!response.ok) throw new Error('Failed to update');
        showStatus('Skill updated successfully!', false);
        loadPortfolioData();
      } catch (error) {
        showStatus('Error updating skill: ' + error.message, true);
      }
    }

    function renderSkills(skills) {
          const list = document.getElementById('skills-list');
          list.innerHTML = skills.map((skill, index) => '<div class="item"><div class="item-content"><h4>' + skill.title + '</h4><p>' + skill.description + '</p></div><div class="item-actions"><button class="btn-secondary" onclick="updateSkill(' + index + ')">Edit</button><button class="btn-secondary" style="background:#fee2e2;color:#991b1b;margin-left:6px;" onclick="deleteSkill(' + index + ')">Delete</button></div></div>').join('');
    }

        async function deleteSkill(index) {
          if (!confirm('Delete this skill?')) return;
          try {
            const response = await fetch(apiUrl + '/portfolio/skill/' + index, { method: 'DELETE' });
            if (!response.ok) throw new Error('Failed to delete');
            showStatus('Skill deleted successfully!', false);
            loadPortfolioData();
          } catch (error) {
            showStatus('Error deleting skill: ' + error.message, true);
          }
        }

    async function addQualification() {
      const qualification = document.getElementById('qualification').value.trim();

      if (!qualification) {
        showStatus('Please enter a qualification', true);
        return;
      }

      try {
        const response = await fetch(apiUrl + '/portfolio/qualification', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ qualification }),
        });

        if (!response.ok) throw new Error('Failed to add');
        showStatus('Qualification added successfully!', false);
        document.getElementById('qualification').value = '';
        loadPortfolioData();
      } catch (error) {
        showStatus('Error adding qualification: ' + error.message, true);
      }
    }

    async function updateQualification(index) {
      const qualification = prompt('Qualification:');
      if (!qualification) return;

      try {
        const response = await fetch(apiUrl + '/portfolio/qualification/' + index, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ qualification }),
        });

        if (!response.ok) throw new Error('Failed to update');
        showStatus('Qualification updated successfully!', false);
        loadPortfolioData();
      } catch (error) {
        showStatus('Error updating qualification: ' + error.message, true);
      }
    }

    function renderQualifications(qualifications) {
          const list = document.getElementById('qualifications-list');
          list.innerHTML = qualifications.map((qual, index) => '<div class="item"><div class="item-content"><p>' + qual + '</p></div><div class="item-actions"><button class="btn-secondary" onclick="updateQualification(' + index + ')">Edit</button><button class="btn-secondary" style="background:#fee2e2;color:#991b1b;margin-left:6px;" onclick="deleteQualification(' + index + ')">Delete</button></div></div>').join('');
    }

        async function deleteQualification(index) {
          if (!confirm('Delete this qualification?')) return;
          try {
            const response = await fetch(apiUrl + '/portfolio/qualification/' + index, { method: 'DELETE' });
            if (!response.ok) throw new Error('Failed to delete');
            showStatus('Qualification deleted successfully!', false);
            loadPortfolioData();
          } catch (error) {
            showStatus('Error deleting qualification: ' + error.message, true);
          }
        }

    async function addProject() {
      const title = document.getElementById('project-title').value.trim();
      const description = document.getElementById('project-desc').value.trim();

      if (!title || !description) {
        showStatus('Please fill in all fields', true);
        return;
      }

      try {
        const response = await fetch(apiUrl + '/portfolio/project', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description }),
        });

        if (!response.ok) throw new Error('Failed to add');
        showStatus('Project added successfully!', false);
        document.getElementById('project-title').value = '';
        document.getElementById('project-desc').value = '';
        loadPortfolioData();
      } catch (error) {
        showStatus('Error adding project: ' + error.message, true);
      }
    }

    async function updateProject(index) {
      const title = prompt('Project Title:');
      if (!title) return;
      const description = prompt('Project Description:');
      if (!description) return;

      try {
        const response = await fetch(apiUrl + '/portfolio/project/' + index, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description }),
        });

        if (!response.ok) throw new Error('Failed to update');
        showStatus('Project updated successfully!', false);
        loadPortfolioData();
      } catch (error) {
        showStatus('Error updating project: ' + error.message, true);
      }
    }

    function renderProjects(projects) {
          const list = document.getElementById('projects-list');
          list.innerHTML = projects.map((project, index) => '<div class="item"><div class="item-content"><h4>' + project.title + '</h4><p>' + project.description + '</p></div><div class="item-actions"><button class="btn-secondary" onclick="updateProject(' + index + ')">Edit</button><button class="btn-secondary" style="background:#fee2e2;color:#991b1b;margin-left:6px;" onclick="deleteProject(' + index + ')">Delete</button></div></div>').join('');
    }

        async function deleteProject(index) {
          if (!confirm('Delete this project?')) return;
          try {
            const response = await fetch(apiUrl + '/portfolio/project/' + index, { method: 'DELETE' });
            if (!response.ok) throw new Error('Failed to delete');
            showStatus('Project deleted successfully!', false);
            loadPortfolioData();
          } catch (error) {
            showStatus('Error deleting project: ' + error.message, true);
          }
        }

    document.addEventListener('DOMContentLoaded', loadPortfolioData);
  </script>
</body>
</html>
